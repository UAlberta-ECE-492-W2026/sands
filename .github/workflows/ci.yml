name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - name: Setup venv
        run: ./x.sh setup-venv
      - name: Run tests
        run: ./x.sh tests
      - name: Run type checks
        run: ./x.sh check
